<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Capacitor Settings Launcher</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"
    ></script>
    <script
      nomodule
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css"
    />

    <script type="module" src="./js/script.js"></script>
  </head>
  <body>
    <ion-app>
      <ion-header>
        <ion-toolbar>
          <ion-title>Settings Launcher</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-button id="openAppSettings" expand="block"
          >Open App Settings</ion-button
        >
        <ion-button id="openNotificationSettings" expand="block"
          >Open Notification Settings</ion-button
        >
        <ion-item>
          <ion-select
            id="androidSettingsPage"
            label="Android Settings Page"
            value="WIFI"
          >
            <ion-select-option value="ACCESSIBILITY"
              >ACCESSIBILITY</ion-select-option
            >
            <ion-select-option value="BLUETOOTH">BLUETOOTH</ion-select-option>
            <ion-select-option value="DATE">DATE</ion-select-option>
            <ion-select-option value="DISPLAY">DISPLAY</ion-select-option>
            <ion-select-option value="LOCATION">LOCATION</ion-select-option>
            <ion-select-option value="SECURITY">SECURITY</ion-select-option>
            <ion-select-option value="SOUND">SOUND</ion-select-option>
            <ion-select-option value="WIFI">WIFI</ion-select-option>
            <ion-select-option value="WIRELESS">WIRELESS</ion-select-option>
          </ion-select>
        </ion-item>
        <ion-button id="openAndroidSettings" expand="block"
          >Open Android Settings</ion-button
        >
      </ion-content>
    </ion-app>
  </body>
</html>
