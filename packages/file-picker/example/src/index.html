<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Capacitor File Picker</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <script
      type="module"
      src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.js"
    ></script>

    <link rel="icon" type="image/x-icon" href="./assets/icon/favicon.ico" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./css/style.css" />
    <meta name="theme-color" content="#31d53d" />

    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"
    ></script>
    <script
      nomodule
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css"
    />

    <script type="module" src="./js/script.js"></script>
  </head>
  <body>
    <ion-app>
      <ion-header>
        <ion-toolbar>
          <ion-title>Capacitor File Picker</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-list>
          <ion-button id="copy-file" expand="block">Copy File</ion-button>
          <ion-button id="pick-files" expand="block">Pick Files</ion-button>
          <ion-button id="pick-images" expand="block">Pick Images</ion-button>
          <ion-button id="pick-media" expand="block">Pick Media</ion-button>
          <ion-button id="pick-videos" expand="block">Pick Videos</ion-button>
        </ion-list>
        <ion-list>
          <ion-item>
            <ion-input id="name-input" label="Name" readonly></ion-input>
          </ion-item>
          <ion-item>
            <ion-input
              id="mime-type-input"
              label="MIME Type"
              readonly
            ></ion-input>
          </ion-item>
          <ion-item>
            <ion-input
              id="size-input"
              label="Size (bytes)"
              readonly
            ></ion-input>
          </ion-item>
          <ion-item>
            <ion-input id="path-input" label="Path" readonly></ion-input>
          </ion-item>
          <ion-item>
            <ion-input
              id="modified-at-input"
              label="Modified At"
              readonly
            ></ion-input>
          </ion-item>
          <ion-item>
            <ion-input
              id="duration-input"
              label="Duration (s)"
              readonly
            ></ion-input>
          </ion-item>
          <ion-item>
            <ion-input id="width-input" label="Width (px)" readonly></ion-input>
          </ion-item>
          <ion-item>
            <ion-input
              id="height-input"
              label="Height (px)"
              readonly
            ></ion-input>
          </ion-item>
        </ion-list>
        <ion-img id="image"></ion-img>
      </ion-content>
    </ion-app>
  </body>
</html>
