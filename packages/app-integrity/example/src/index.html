<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Capacitor App Integrity</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"
    ></script>
    <script
      nomodule
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css"
    />

    <script type="module" src="./js/script.js"></script>
  </head>
  <body>
    <ion-app>
      <ion-header>
        <ion-toolbar>
          <ion-title>App Integrity</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-button id="isAvailable" expand="block">Is Available</ion-button>
        <ion-button id="prepareIntegrityToken" expand="block"
          >Prepare Integrity Token</ion-button
        >
        <ion-button id="requestIntegrityTokenStandard" expand="block"
          >Request Integrity Token (Standard)</ion-button
        >
        <ion-button id="requestIntegrityTokenClassic" expand="block"
          >Request Integrity Token (Classic)</ion-button
        >
        <ion-button id="generateKey" expand="block">Generate Key</ion-button>
        <ion-button id="attestKey" expand="block">Attest Key</ion-button>
        <ion-button id="generateAssertion" expand="block"
          >Generate Assertion</ion-button
        >
      </ion-content>
    </ion-app>
  </body>
</html>
