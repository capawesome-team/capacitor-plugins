<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Capacitor Toast</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"
    ></script>
    <script
      nomodule
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css"
    />

    <script type="module" src="./js/script.js"></script>
  </head>
  <body>
    <ion-app>
      <ion-header>
        <ion-toolbar>
          <ion-title>Toast</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-item>
          <ion-input id="text" label="Text" value="Hello World!"></ion-input>
        </ion-item>
        <ion-item>
          <ion-select id="duration" label="Duration" value="SHORT">
            <ion-select-option value="SHORT">SHORT</ion-select-option>
            <ion-select-option value="LONG">LONG</ion-select-option>
          </ion-select>
        </ion-item>
        <ion-item>
          <ion-select id="position" label="Position" value="BOTTOM">
            <ion-select-option value="TOP">TOP</ion-select-option>
            <ion-select-option value="CENTER">CENTER</ion-select-option>
            <ion-select-option value="BOTTOM">BOTTOM</ion-select-option>
          </ion-select>
        </ion-item>
        <ion-button id="show" expand="block">Show</ion-button>
      </ion-content>
    </ion-app>
  </body>
</html>
