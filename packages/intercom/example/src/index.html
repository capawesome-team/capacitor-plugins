<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Capacitor Intercom</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <script
      type="module"
      src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.js"
    ></script>

    <link rel="icon" type="image/x-icon" href="./assets/icon/favicon.ico" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./css/style.css" />
    <meta name="theme-color" content="#31d53d" />

    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"
    ></script>
    <script
      nomodule
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css"
    />

    <script type="module" src="./js/script.js"></script>
  </head>
  <body>
    <ion-app>
      <ion-header>
        <ion-toolbar>
          <ion-title>Capacitor Intercom</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-list>
          <ion-button id="initialize-button" expand="block"
            >Initialize</ion-button
          >
          <ion-button id="login-user-button" expand="block"
            >Login User</ion-button
          >
          <ion-button id="login-unidentified-user-button" expand="block"
            >Login Unidentified User</ion-button
          >
          <ion-button id="update-user-button" expand="block"
            >Update User</ion-button
          >
          <ion-button id="present-button" expand="block">Present</ion-button>
          <ion-button id="present-message-composer-button" expand="block"
            >Present Message Composer</ion-button
          >
          <ion-button id="log-event-button" expand="block"
            >Log Event</ion-button
          >
          <ion-button id="get-unread-count-button" expand="block"
            >Get Unread Count</ion-button
          >
          <ion-button id="set-launcher-visible-button" expand="block"
            >Toggle Launcher</ion-button
          >
          <ion-button id="logout-button" expand="block">Logout</ion-button>
        </ion-list>
      </ion-content>
    </ion-app>
  </body>
</html>
