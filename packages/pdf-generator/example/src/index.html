<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Capacitor PDF Generator</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"
    ></script>
    <script
      nomodule
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css"
    />

    <script type="module" src="./js/script.js"></script>
  </head>
  <body>
    <ion-app>
      <ion-header>
        <ion-toolbar>
          <ion-title>PDF Generator</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-item>
          <ion-select id="pageSize" label="Page Size" value="A4">
            <ion-select-option value="A3">A3</ion-select-option>
            <ion-select-option value="A4">A4</ion-select-option>
            <ion-select-option value="A5">A5</ion-select-option>
            <ion-select-option value="LETTER">LETTER</ion-select-option>
          </ion-select>
        </ion-item>
        <ion-item>
          <ion-select id="orientation" label="Orientation" value="PORTRAIT">
            <ion-select-option value="PORTRAIT">PORTRAIT</ion-select-option>
            <ion-select-option value="LANDSCAPE">LANDSCAPE</ion-select-option>
          </ion-select>
        </ion-item>
        <ion-button id="generateFromHtml" expand="block"
          >Generate from HTML</ion-button
        >
        <ion-item>
          <ion-input
            id="url"
            label="URL"
            value="https://capawesome.io/"
          ></ion-input>
        </ion-item>
        <ion-button id="generateFromUrl" expand="block"
          >Generate from URL</ion-button
        >
        <ion-button id="openViewer" expand="block" disabled
          >Open in Viewer</ion-button
        >
        <ion-item>
          <ion-label id="path" class="ion-text-wrap"></ion-label>
        </ion-item>
      </ion-content>
    </ion-app>
  </body>
</html>
